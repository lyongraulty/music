<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calendar Higher Crop Preview</title>
    <style>
      :root {
        --paper: #f6f1e7;
        --ink: #101010;
        --accent: #e8380a;
        --line: rgba(16, 16, 16, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background-color: var(--paper);
        background-image: linear-gradient(to bottom, rgba(16, 16, 16, 0.03) 1px, transparent 1px);
        background-size: 100% 4px;
        color: var(--ink);
        font-family: "Courier New", Courier, monospace;
      }

      .bar {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.72rem clamp(1rem, 2.6vw, 1.5rem);
        background: var(--accent);
        color: white;
      }

      .bar p,
      .label,
      .meta {
        margin: 0;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      main {
        display: grid;
        gap: 1rem;
        padding: clamp(1rem, 2.6vw, 1.5rem);
      }

      .module {
        display: grid;
        gap: 0.7rem;
        width: min(100%, 800px);
      }

      .moduleHeader {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        padding-bottom: 0.45rem;
        border-bottom: 1px solid var(--line);
      }

      .label {
        color: rgba(16, 16, 16, 0.48);
      }

      .meta {
        color: rgba(16, 16, 16, 0.54);
      }

      .frame {
        width: 100%;
        overflow: hidden;
        background: transparent;
      }

      .crop {
        width: 800px;
        height: 380px;
        position: relative;
        overflow: hidden;
        mix-blend-mode: multiply;
      }

      iframe {
        width: 800px;
        height: 600px;
        position: absolute;
        top: -20px;
        left: -20px;
        border: 0;
        transform: scale(1.1);
        transform-origin: top left;
      }

      @media (max-width: 820px) {
        .frame {
          overflow-x: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <p>Lyon Graulty - Music</p>
      <p>Calendar Preview</p>
    </div>

    <main>
      <section class="module">
        <div class="moduleHeader">
          <p class="label">Higher Crop Reference</p>
          <p class="meta">white dots, top -20px</p>
        </div>
        <div class="frame">
          <div class="crop">
            <iframe
              src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FChicago&showPrint=0&showTitle=0&showNav=0&showDate=0&mode=AGENDA&showTabs=0&showTz=0&showCalendars=0&src=N2IzZTA5ZmYzYmM5ZmVkODU0NmVlYWUwMzEwYzNhZDhhYzBlMzUzMTY1ZGE0MmIxMjEwZjdhNmFiYjgwZjIwMEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23ffffff"
              title="Higher crop calendar with white dots"
            ></iframe>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
