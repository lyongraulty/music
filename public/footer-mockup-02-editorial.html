<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Footer Mockup 02 - Editorial</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f6f1e7;
        color: #101010;
        font-family: "PT Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .page-spacer {
        min-height: 48vh;
        display: grid;
        place-items: center;
        color: rgba(16, 16, 16, 0.36);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 11px;
      }

      footer {
        min-height: 520px;
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(240px, 0.5fr);
        gap: clamp(2rem, 7vw, 6rem);
        align-items: end;
        padding: clamp(4rem, 9vw, 8rem) clamp(1rem, 3vw, 2rem);
        border-top: 1px solid rgba(16, 16, 16, 0.12);
      }

      .statement {
        margin: 0;
        font-family: "Arial Black", Impact, sans-serif;
        font-size: clamp(2.8rem, 9vw, 8rem);
        line-height: 0.9;
        text-transform: uppercase;
      }

      .side {
        display: flex;
        flex-direction: column;
        gap: 1.4rem;
        border-left: 1px solid rgba(16, 16, 16, 0.14);
        padding-left: clamp(1rem, 3vw, 2rem);
      }

      .side p {
        margin: 0;
        font-size: 12px;
        line-height: 1.7;
        color: rgba(16, 16, 16, 0.62);
      }

      .actions {
        display: grid;
        gap: 0.65rem;
      }

      a,
      button {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        border: 1px solid rgba(16, 16, 16, 0.18);
        background: transparent;
        color: #101010;
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-decoration: none;
      }

      .meta {
        color: rgba(16, 16, 16, 0.46);
        font-size: 10px;
        letter-spacing: 0.1em;
        line-height: 1.5;
        text-transform: uppercase;
      }

      @media (max-width: 760px) {
        footer {
          grid-template-columns: 1fr;
          align-items: start;
        }

        .side {
          border-left: none;
          border-top: 1px solid rgba(16, 16, 16, 0.14);
          padding-left: 0;
          padding-top: 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-spacer">Footer placement preview</div>
    <footer>
      <h1 class="statement">Available for music work.</h1>
      <div class="side">
        <p>Bookings, recording sessions, arranging, and select touring.</p>
        <div class="actions">
          <a href="https://www.instagram.com/lyongraultymusic/">Instagram <span>@lyongraultymusic</span></a>
          <button type="button">Email <span>Copy</span></button>
          <a href="https://lyongraulty.com/">Motion Design <span>lyongraulty.com</span></a>
        </div>
        <div class="meta">Copyright 2026 Lyon Graulty Creative</div>
      </div>
    </footer>
  </body>
</html>
