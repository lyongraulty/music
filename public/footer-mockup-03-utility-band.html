<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Footer Mockup 03 - Utility Band</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f6f1e7;
        color: #101010;
        font-family: "PT Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      .page-spacer {
        min-height: 48vh;
        display: grid;
        place-items: center;
        color: rgba(16, 16, 16, 0.36);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 11px;
      }

      footer {
        min-height: 460px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: clamp(4rem, 9vw, 7rem) clamp(1rem, 3vw, 2rem) clamp(1rem, 3vw, 2rem);
        border-top: 1px solid rgba(16, 16, 16, 0.12);
      }

      .topline {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        color: rgba(16, 16, 16, 0.44);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 820px;
        margin: 0;
        font-family: "Arial Black", Impact, sans-serif;
        font-size: clamp(1.8rem, 5vw, 4.4rem);
        line-height: 1.05;
        text-transform: uppercase;
      }

      .bar {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border: 1px solid rgba(16, 16, 16, 0.16);
      }

      a,
      button {
        min-height: 58px;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0 1rem;
        border: 0;
        border-right: 1px solid rgba(16, 16, 16, 0.16);
        background: transparent;
        color: #101010;
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-decoration: none;
      }

      a:last-child {
        border-right: 0;
      }

      span {
        color: rgba(16, 16, 16, 0.44);
      }

      @media (max-width: 700px) {
        .topline {
          flex-direction: column;
        }

        .bar {
          grid-template-columns: 1fr;
        }

        a,
        button {
          border-right: 0;
          border-bottom: 1px solid rgba(16, 16, 16, 0.16);
        }

        a:last-child {
          border-bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-spacer">Footer placement preview</div>
    <footer>
      <div class="topline">
        <span>Copyright 2026 Lyon Graulty Creative</span>
        <span>Austin, TX</span>
      </div>
      <h1>Available for bookings, sessions, arranging, and select touring.</h1>
      <div class="bar">
        <a href="https://www.instagram.com/lyongraultymusic/">Instagram <span>@lyongraultymusic</span></a>
        <button type="button">Email <span>Copy address</span></button>
        <a href="https://lyongraulty.com/">Motion Design <span>lyongraulty.com</span></a>
      </div>
    </footer>
  </body>
</html>
